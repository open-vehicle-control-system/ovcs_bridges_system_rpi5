name: build + release

# Builds the Nerves system with Buildroot and attaches the portable
# tarball to the GitHub release whose tag triggered the run.
#
# Triggers:
#   - push of any tag matching v* (e.g. v0.4.3) → build + create
#     release with the tarball.
#   - manual workflow_dispatch → build only, artifact uploaded as a
#     workflow artifact (no release attached).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  # ubuntu-22.04 ships GCC 11 + CMake 3.22, which matches what
  # Buildroot 2025.11 was tested against. Newer Ubuntu releases ship
  # GCC 13+ / CMake 4 and trip implicit-function-declaration errors
  # in gnulib-derived host packages.
  #
  # OTP must match the version the Nerves system ships on target —
  # upstream nerves_system_rpi5 v2.x ships OTP 28, so host needs 28
  # too (Mix refuses to cross-compile across major OTP versions).
  ERLANG_VERSION: "28.4.1"
  ELIXIR_VERSION: "1.19.5-otp-28"
  NERVES_BOOTSTRAP_VERSION: "1.15.0"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update
          # Set per the Nerves system-building docs. The big ones are
          # build-essential, bc, cmake, squashfs-tools, libssl-dev,
          # libncurses5-dev — without those the host-tooling chain
          # fails partway through.
          sudo apt-get install -y --no-install-recommends \
            git build-essential bc cmake cvs wget curl mercurial \
            python3 python3-aiohttp python3-flake8 python3-ijson \
            python3-nose2 python3-pexpect python3-pip python3-requests \
            rsync subversion unzip gawk jq squashfs-tools libssl-dev \
            automake autoconf libncurses5-dev libtool

      - name: Install fwup
        run: |
          # fwup is the firmware-packager Nerves uses to assemble the
          # final .fw image. The Debian package is fine.
          wget -q https://github.com/fwup-home/fwup/releases/download/v1.12.0/fwup_1.12.0_amd64.deb
          sudo apt-get install -y ./fwup_1.12.0_amd64.deb

      - name: Install Erlang + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.ERLANG_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Hex + Rebar + nerves_bootstrap
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix archive.install --force hex nerves_bootstrap ${{ env.NERVES_BOOTSTRAP_VERSION }}

      # ── caches ────────────────────────────────────────────────────
      # Two independent caches stack to cut subsequent builds from
      # ~60 min to <10 min:
      #
      #   1. ~/.nerves/dl/        — Buildroot source tarballs (all
      #      ~150 packages). Invalidated only when nerves_defconfig
      #      changes the package list.
      #   2. ~/.nerves/artifacts/ — the cross-compile toolchain
      #      Nerves downloads (nerves_toolchain_aarch64_nerves_linux_gnu,
      #      ~500 MB after extract). Invalidated when nerves_system_br
      #      or the toolchain mix lock entry changes.
      #
      # Restoring saves the network + extract cost; the host
      # toolchain compile + most package builds still run, but
      # incremental Buildroot reuses object files where it can.
      - name: Cache Buildroot source downloads
        uses: actions/cache@v4
        with:
          path: ~/.nerves/dl
          key: nerves-dl-${{ hashFiles('nerves_defconfig', 'mix.lock') }}
          restore-keys: |
            nerves-dl-

      - name: Cache Nerves toolchain artifacts
        uses: actions/cache@v4
        with:
          path: ~/.nerves/artifacts
          key: nerves-toolchain-${{ hashFiles('mix.lock') }}
          restore-keys: |
            nerves-toolchain-

      - name: Fetch Mix dependencies
        env:
          MIX_TARGET: rpi5
        run: mix deps.get

      - name: Build the Nerves system (Buildroot)
        env:
          MIX_TARGET: rpi5
        # First-time Buildroot can take 30–60 min even with -j4;
        # cached builds with .nerves/dl + toolchain populated drop
        # to ~10–15 min. BR2_JLEVEL + MAKEFLAGS are exported with
        # shell expansion so $(nproc) actually resolves.
        timeout-minutes: 90
        run: |
          export BR2_JLEVEL="$(nproc)"
          export MAKEFLAGS="-j$(nproc)"
          echo "Building with BR2_JLEVEL=$BR2_JLEVEL"
          mix compile

      - name: Package the portable tarball
        env:
          MIX_TARGET: rpi5
        # `mix compile` leaves the system as a directory tree under
        # .nerves/artifacts/<name>-portable-<version>/. The
        # canonical, releasable artifact is a tarball of that
        # directory — `mix nerves.artifact` is the Nerves task that
        # creates it (named `<name>-portable-<version>-<sha>.tar.gz`).
        run: mix nerves.artifact

      - name: Locate the portable tarball
        id: artifact
        run: |
          set -e
          # Tarball lands either in .nerves/artifacts/ or in the
          # project root depending on the Nerves version; check both.
          path=$(ls .nerves/artifacts/${{ github.event.repository.name }}-portable-*.tar.gz \
                    ${{ github.event.repository.name }}-portable-*.tar.gz \
                    2>/dev/null | head -1)
          if [ -z "$path" ]; then
            echo "no tarball found" >&2
            echo "--- .nerves/artifacts/ ---"
            ls -la .nerves/artifacts/ || true
            echo "--- project root ---"
            ls -la ./*.tar.gz 2>/dev/null || true
            exit 1
          fi
          name=$(basename "$path")
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Built: $name"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # `tag_name` defaults to github.ref_name (the pushed tag),
          # so v0.4.3 → release tagged v0.4.3 with the tarball
          # attached. If the release already exists (e.g. tag was
          # created before this workflow), softprops/action-gh-release
          # appends to it.
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
